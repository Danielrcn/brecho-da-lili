<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Jost:wght@300&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  overflow:hidden;
  background:#0e0a08;
  font-family:'Jost',sans-serif;
}

/* CONTAINER */
.wrapper{
  display:flex;
  height:100vh;
  width:300vw;
  transition:transform .8s cubic-bezier(.77,0,.18,1);
}

/* SLIDE */
.slide{
  width:100vw;
  height:100vh;
  position:relative;
  flex-shrink:0;
  overflow:hidden;
}

/* IMAGEM */
.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.1);
  transition:transform 1.2s ease;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.7),transparent);
}

/* TEXTO */
.content{
  position:absolute;
  bottom:3rem;
  left:2rem;
  color:#fff;
}

.cat{
  font-size:.7rem;
  letter-spacing:.4em;
}

.name{
  font-family:'Cormorant Garamond',serif;
  font-size:2.8rem;
}

.price{
  margin-top:.5rem;
  font-size:1.4rem;
}

/* CTA */
.cta{
  position:fixed;
  bottom:1rem;
  left:50%;
  transform:translateX(-50%);
}

.cta a{
  padding:1rem 2rem;
  background:#fff;
  color:#000;
  text-decoration:none;
  font-size:.8rem;
  letter-spacing:.2em;
}

/* DOTS */
.dots{
  position:fixed;
  right:1rem;
  top:50%;
  transform:translateY(-50%);
}

.dot{
  width:6px;
  height:6px;
  background:#777;
  margin:.5rem 0;
  border-radius:50%;
}

.dot.active{
  background:#fff;
  transform:scale(1.5);
}
</style>
</head>

<body>

<div class="wrapper" id="wrap"></div>

<div class="cta">
  <a id="ctaBtn" target="_blank">Tenho interesse</a>
</div>

<div class="dots" id="dots"></div>

<script>
const WHATS = '5562999999999';

const products = [
  {
    cat:'Vestido',
    name:'Floral Vintage',
    price:'35',
    img:'https://images.unsplash.com/photo-1490481651871-ab68de25d43d?w=1200',
    msg:'Tenho interesse no Vestido Floral Vintage 🌸'
  },
  {
    cat:'Blusa',
    name:'Tricô Rosé',
    price:'22',
    img:'https://images.unsplash.com/photo-1520975661595-6453be3f7070?w=1200',
    msg:'Tenho interesse na Blusa Tricô Rosé 🌸'
  },
  {
    cat:'Calça',
    name:'Pantalona Chic',
    price:'45',
    img:'https://images.unsplash.com/photo-1529139574466-a303027c1d8b?w=1200',
    msg:'Tenho interesse na Pantalona Chic 🌸'
  }
];

const wrap = document.getElementById('wrap');
const dots = document.getElementById('dots');
const cta = document.getElementById('ctaBtn');

let current = 0;

/* RENDER */
products.forEach((p,i)=>{

  const slide = document.createElement('div');
  slide.className='slide';

  slide.innerHTML = `
    <img src="${p.img}">
    <div class="overlay"></div>
    <div class="content">
      <div class="cat">${p.cat}</div>
      <div class="name">${p.name}</div>
      <div class="price">R$ ${p.price}</div>
    </div>
  `;

  slide.onclick = ()=>{
    cta.href = `https://wa.me/${WHATS}?text=${encodeURIComponent(p.msg)}`;
  };

  wrap.appendChild(slide);

  const d = document.createElement('div');
  d.className='dot'+(i===0?' active':'');
  dots.appendChild(d);
});

/* NAVEGAÇÃO */
function update(){
  wrap.style.transform = `translateX(-${current*100}vw)`;

  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.toggle('active',i===current);
  });
}

/* SCROLL */
window.addEventListener('wheel',(e)=>{
  if(e.deltaY>0) current = Math.min(current+1,products.length-1);
  else current = Math.max(current-1,0);
  update();
});

/* TOUCH */
let startX=0;
window.addEventListener('touchstart',e=>startX=e.touches[0].clientX);
window.addEventListener('touchend',e=>{
  let dx = e.changedTouches[0].clientX - startX;
  if(dx<-50) current = Math.min(current+1,products.length-1);
  if(dx>50) current = Math.max(current-1,0);
  update();
});

/* INIT */
cta.href = `https://wa.me/${WHATS}?text=Olá! Vim pelo site 🌸`;
</script>

</body>
</html>
