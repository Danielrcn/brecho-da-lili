<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Jost:wght@200;300&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

<style>
html{
  scroll-snap-type:y mandatory;
}

body{
  margin:0;
  background:#0b0706;
  font-family:'Jost',sans-serif;
  color:#fff;
  overflow-x:hidden;
}

/* SEÇÃO */
.section{
  height:100vh;
  scroll-snap-align:start;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:flex-end;
  padding:2rem;
}

/* IMAGEM */
.bg{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  transform:scale(1.1);
  will-change:transform;
}

/* OVERLAY */
.overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.85), transparent);
}

/* TEXTO */
.content{
  position:relative;
  z-index:2;
}

.cat{
  font-size:.7rem;
  letter-spacing:.4em;
  color:var(--accent);
}

.name{
  font-family:'Cormorant Garamond',serif;
  font-size:2.2rem;
  line-height:1.1;
}

.price{
  margin-top:.5rem;
  font-size:1.3rem;
  color:var(--accent);
}

/* CTA */
.cta{
  position:fixed;
  bottom:0;
  width:100%;
  padding:1rem;
  background:linear-gradient(to top,#0b0706,transparent);
}

.cta a{
  display:block;
  text-align:center;
  padding:1rem;
  background:var(--accent);
  color:#000;
  text-decoration:none;
  letter-spacing:.2em;
}

/* MOBILE */
@media(max-width:768px){
  .name{font-size:1.8rem}
  .price{font-size:1.1rem}
}
</style>
</head>

<body>

<div id="app"></div>

<div class="cta">
  <a id="ctaBtn" target="_blank">Tenho interesse</a>
</div>

<audio id="tick" preload="auto" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

<script>
gsap.registerPlugin(ScrollTrigger);

const WHATS = '5562999999999';

/* PRODUTOS */
const products = [
  {
    cat:'Vestido',
    name:'Floral Elegance',
    price:'35',
    accent:'#D4879A',
    img:'https://images.unsplash.com/photo-1520975922324-2c1b3a4c8d2b?w=1200',
    msg:'Tenho interesse no Vestido Floral Elegance 🌸'
  },
  {
    cat:'Blusa',
    name:'Tricô Rosé',
    price:'22',
    accent:'#C9A96E',
    img:'https://images.unsplash.com/photo-1503341455253-b2e723bb3dbb?w=1200',
    msg:'Tenho interesse na Blusa Tricô Rosé 🌸'
  },
  {
    cat:'Calça',
    name:'Pantalona Sage',
    price:'45',
    accent:'#8FAF8A',
    img:'https://images.unsplash.com/photo-1521334884684-d80222895322?w=1200',
    msg:'Tenho interesse na Pantalona Sage 🌸'
  }
];

const app = document.getElementById('app');
const ctaBtn = document.getElementById('ctaBtn');
const audio = document.getElementById('tick');

/* RENDER IMEDIATO (SEM BLOQUEIO) */
products.forEach((p,i)=>{
  const section = document.createElement('div');
  section.className='section';
  section.style.setProperty('--accent',p.accent);

  section.innerHTML = `
    <img class="bg" src="${p.img}" loading="${i===0?'eager':'lazy'}"
      onerror="this.style.background='#000';this.remove();">
    <div class="overlay"></div>

    <div class="content">
      <div class="cat">${p.cat}</div>
      <div class="name">${p.name}</div>
      <div class="price">R$ ${p.price}</div>
    </div>
  `;

  section.addEventListener('click', ()=>{
    ctaBtn.href =
      `https://wa.me/${WHATS}?text=${encodeURIComponent(p.msg)}`;

    // som seguro
    audio.currentTime = 0;
    audio.play().catch(()=>{});
  });

  app.appendChild(section);
});

/* CTA PADRÃO */
ctaBtn.href = `https://wa.me/${WHATS}?text=Olá! Vim pelo site 🌸`;

/* ANIMAÇÕES */
function initAnimations(){

  gsap.utils.toArray('.section').forEach(sec=>{

    const img = sec.querySelector('.bg');
    const content = sec.querySelector('.content');

    /* PARALLAX */
    if(img){
      gsap.to(img,{
        y:80,
        ease:"none",
        scrollTrigger:{
          trigger:sec,
          scrub:true
        }
      });
    }

    /* ENTRADA */
    gsap.from(content,{
      y:100,
      opacity:0,
      duration:1.2,
      ease:"power3.out",
      scrollTrigger:{
        trigger:sec,
        start:"top 75%"
      }
    });

  });

}

/* INIT SEGURO */
window.addEventListener('load', ()=>{
  initAnimations();
});
</script>

</body>
</html>
